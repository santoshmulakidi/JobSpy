services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jobintel
      POSTGRES_USER: jobintel
      POSTGRES_PASSWORD: jobintel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobintel -d jobintel"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      JOB_INTELLIGENCE_DATABASE_URL: postgresql+psycopg://jobintel:jobintel@postgres:5432/jobintel
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["streamlit", "run", "dashboard/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    environment:
      JOB_INTELLIGENCE_DATABASE_URL: postgresql+psycopg://jobintel:jobintel@postgres:5432/jobintel
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "scheduler.runner"]
    environment:
      JOB_INTELLIGENCE_DATABASE_URL: postgresql+psycopg://jobintel:jobintel@postgres:5432/jobintel
      JOB_INTELLIGENCE_SCHEDULER_HOURS: "4"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
