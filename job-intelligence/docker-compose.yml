services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: always
    env_file: .env
    environment:
      JOB_INTELLIGENCE_DATABASE_URL: sqlite:////data/job_intelligence.db

    volumes:
      - db-data:/data

  # ── Hourly scheduler ────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: ["python", "-m", "scheduler.runner"]
    restart: always
    env_file: .env
    environment:
      JOB_INTELLIGENCE_DATABASE_URL: sqlite:////data/job_intelligence.db

    volumes:
      - db-data:/data         # same volume as API — shares the SQLite file

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_JOB_API_URL: /api   # Nginx routes /api → FastAPI
    restart: always

  # ── Nginx reverse proxy (single public entry point) ──────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  db-data:   # SQLite file + backups persist here across restarts and upgrades
